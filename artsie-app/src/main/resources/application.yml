spring:
  application:
    name: artsie-web-service

  # ---- Default profile: H2 in-memory for local development ----
  datasource:
    url: jdbc:h2:mem:artsie;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

# ---- S3 storage config ----
artsie:
  storage:
    s3:
      bucket-name: ${S3_BUCKET_NAME:artsie-media-dev}
      region: ${AWS_REGION:us-east-1}
      photo-prefix: photos/
      video-prefix: videos/
      thumbnail-prefix: thumbnails/
      presigned-url-expiration-minutes: 60

# ---- Actuator ----
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

server:
  port: 8080

---

# ---- Production profile ----
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:artsie}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:artsie}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  h2:
    console:
      enabled: false
